# Database Settings
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?rewriteBatchedStatements=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

cpu.core=8
spring.datasource.hikari.maximum-pool-size=16
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true

## Security Settings
# CSRF Settings
csrf.cookie-domain=chessopeningstat.com
csrf.cookie-samesite=Strict
csrf.cookie-secure=true
# CORS Settings
cors.allowed-origins=https://www.chessopeningstat.com
