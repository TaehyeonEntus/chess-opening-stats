spring.application.name=backend
server.port=8080

# Database Settings
spring.datasource.url=jdbc:mysql://${DBHOST}:${DBPORT}/${DBDATABASE}?rewriteBatchedStatements=true
spring.datasource.username=${DBUSER}
spring.datasource.password=${DBPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

cpu.core=8
spring.datasource.hikari.maximum-pool-size=16
spring.jpa.hibernate.ddl-auto=create

spring.jpa.show-sql=true
# External API Settings
api.lichess.base-url=https://lichess.org
api.chesscom.base-url=https://api.chess.com
# Logging settings
logging.level.com.chessopeningstats=DEBUG
# Flyway settings

management.endpoints.web.exposure.include=*