spring.application.name=backend
server.port=8080
# Database Settings
#spring.datasource.url=jdbc:mysql://${DBHOST}:${DBPORT}/${DBDATABASE}?rewriteBatchedStatements=true
#spring.datasource.username=${DBUSER}
#spring.datasource.password=${DBPASSWORD}
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:h2:file:../database/testdb;MODE=MySQL;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
cpu.core=12
spring.datasource.hikari.maximum-pool-size=24
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
# External API Settings
api.lichess.base-url=https://lichess.org
api.chesscom.base-url=https://api.chess.com
# Logging settings
logging.level.com.chessopeningstats=DEBUG
# Flyway settings
spring.flyway.baseline-on-migrate=true
management.endpoints.web.exposure.include=*
